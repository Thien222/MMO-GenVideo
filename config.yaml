# ===== Cau hinh cong cu tao video short faceless =====
# Chinh cac gia tri o day de doi nganh, giong doc, style phu de... ma khong can sua code.

niche: english_learning

llm:
  # Model cua Groq (free). Co the doi sang llama-3.1-8b-instant cho nhanh hon.
  model: llama-3.3-70b-versatile
  max_words: 90          # gioi han so tu loi thoai (short nen ngan)
  temperature: 0.8

voice:
  # Giong edge-tts. Mot so giong tot:
  #   en-US-AriaNeural (nu, nang dong)  | en-US-GuyNeural (nam)
  #   en-US-JennyNeural (nu, am)        | en-GB-SoniaNeural (Anh-Anh)
  name: en-US-AriaNeural
  rate: "+8%"            # toc do doc (+nhanh / -cham)
  pitch: "+0Hz"

whisper:
  model: tiny            # tiny (nhanh nhất, khuyến nghị cho deploy) | base | small
  device: cpu
  compute_type: int8

video:
  width: 1080
  height: 1920
  fps: 30

captions:
  # Mau theo dinh dang ASS: &HAABBGGRR (AA=do trong suot, 00 = dac)
  font: Arial
  fontsize: 84
  words_per_chunk: 3            # so tu hien moi lan
  primary_color: "&H0000FFFF"   # mau tu DANG doc (vang) - hieu ung karaoke
  secondary_color: "&H00FFFFFF" # mau tu CHUA doc (trang)
  outline_color: "&H00000000"   # vien den
  outline: 4
  shadow: 1
  margin_v: 620                 # khoang cach tu day len (cang lon cang cao)
  bold: 1

pexels:
  orientation: portrait
  per_keyword: 1
  min_width: 1080

audio:
  music_volume: 0.12     # am luong nhac nen (0.0 - 1.0)
  duck: true             # tu dong ha nhac khi co giong noi

# ===== Cau hinh rieng cho video WHITEBOARD ke chuyen (pipeline_whiteboard) =====
story:
  model: llama-3.3-70b-versatile
  mode: life_lesson          # life_lesson (cau chuyen + bai hoc) | facts (su that/bi an)
  num_scenes: 8              # so canh (moi canh 1 hinh). 6-9 cho video 1-3 phut
  sentences_per_scene: 2     # so cau ke moi canh
  temperature: 0.9
  # Giong rieng cho video ke chuyen - dung giong bieu cam, doc cham de co am dieu, nhan nha:
  voice:
    name: en-US-AndrewMultilingualNeural   # am, tu nhien, hop dan chuyen
    rate: "-6%"                            # cham lai cho co cao trao
    pitch: "+0Hz"

images:
  provider: pollinations     # free, khong can key
  model: flux
  # Style ep ra net ve tay de hieu ung whiteboard dep:
  style: "black and white line art, single color, clean bold thin outlines, high contrast, no shading, no grayscale, plain white background, simple doodle illustration, centered"
  width: 1024
  height: 1024
  request_delay: 16          # giay nghi giua cac lan goi khi KHONG co token (anonymous ~1 req/15s)
  request_delay_auth: 6      # giay nghi khi CO token Pollinations (nhanh hon ~3 lan)
  retries: 3
  timeout: 120

whiteboard:
  draw_ratio: 0.78           # ti le thoi gian de "ve" (con lai giu hinh)
  scene_tail: 0.6            # giay nghi cuoi moi canh
  fps: 30
  ink_threshold: 205         # pixel toi hon nguong nay duoc coi la "net ve"
  margin: 110                # le quanh hinh tren khung 1080x1920
  pen: true                  # ve cay but di chuyen theo net

# Style phu de cho video ke chuyen (dat duoi day, on dinh hon karaoke giua man)
captions_story:
  font: Arial
  fontsize: 60
  words_per_chunk: 4
  primary_color: "&H0000FFFF"
  secondary_color: "&H00FFFFFF"
  outline_color: "&H00000000"
  outline: 4
  shadow: 1
  margin_v: 220
  bold: 1
